        .bg-brand-blue { background-color: var(--brand-blue); }
        .text-brand-blue { color: var(--brand-blue); }
        .btn-primary { background-color: var(--brand-blue); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; justify-content: center; }

        .pdf-custom-toolbar {

            border-bottom: 2px solid var(--brand-blue); position: relative; z-index: 10;

        .pdf-view-box { position: relative; width: 100%; height: 750px; background: #525659; overflow: hidden; }
        
        .pdf-view-box iframe {
            position: absolute; top: -56px; left: 0; width: 100%; height: calc(100% + 56px);
            border: none; z-index: 1;

            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);

        .nav-header { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem; position: sticky; top: 0; z-index: 100; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 3rem; height: 3rem; border: 4px solid #e0f7ff; border-top-color: var(--brand-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

                    <h3 style="margin: 0; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px;">AKSES UNDUH</h3>
                </div>

                    Anda saat ini berada dalam mode "Hanya Membaca". Upgrade ke akun Premium sekarang untuk membuka fitur download file fisik PDF ini.
                </p>
                
                <button type="button" onclick="handleDownloadOrUpgrade()" id="btn-action-pdf" class="btn-primary" style="width: 100%;">

                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--slate-100); padding-bottom: 0.4rem;">
                        <span style="color: #64748b;">Nama Produk</span>
                        <strong id="info-product-name" style="text-align: right; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">-</strong>
                    </div>

    <script>
        let productData = {};
        
        // Pengecekan Admin (VIP) secara global
        const isAdminGlobal = sessionStorage.getItem('adm_v10') === 'true' || localStorage.getItem('melimpah_admin_data') !== null;
        const isPremiumUser = sessionStorage.getItem('user_status') === 'premium' || isAdminGlobal; 

        function applyBrandSettings(data) {
            if(data.site_favicon) {
                let link = document.querySelector("link[rel~='icon']");
                if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                link.href = data.site_favicon;
            }
            if(data.theme_color) {
                let themeStyle = document.getElementById('dynamic-theme');
                if (!themeStyle) { themeStyle = document.createElement('style'); themeStyle.id = 'dynamic-theme'; document.head.appendChild(themeStyle); }
                themeStyle.innerHTML = `:root { --brand-blue: ${data.theme_color} !important; } .bg-brand-blue, .btn-primary { background-color: ${data.theme_color} !important; } .text-brand-blue { color: ${data.theme_color} !important; } .pdf-custom-toolbar { border-bottom-color: ${data.theme_color} !important; }`;
            }
            if(data.site_name) {
                document.querySelectorAll('.dyn-site-name').forEach(el => { el.innerText = data.site_name; });
            }
        }

        async function verifyAndLoad() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            // PERBAIKAN: Jika ID tidak ada, hentikan loading dan beri notifikasi
            if (!productId) { 
                document.getElementById('loading-overlay').style.display = 'none';
                Swal.fire({
                    icon: 'warning',
                    title: 'Akses Ditolak',
                    text: 'ID Dokumen tidak ditemukan atau link tidak valid.',
                    confirmButtonColor: '#0f172a'
                }).then(() => {
                    window.location.replace('/member');
                });
                return; 
            }

            try {
                // Mencegah error jika SCRIPT_URL di config.js gagal dimuat
                const targetUrl = typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : (window.SCRIPT_URL || '');
                if (!targetUrl) throw new Error("URL Database (SCRIPT_URL) belum terhubung.");

                const [setRes, prodRes] = await Promise.all([
                    fetch(targetUrl, { method: 'POST', body: JSON.stringify({ action: 'get_global_settings' }) }).then(r => r.json()),
                    fetch(targetUrl, { method: 'POST', body: JSON.stringify({ action: 'get_product', id: productId }) }).then(r => r.json())
                ]);

                if (setRes.status === 'success') applyBrandSettings(setRes.data);
                
                if (prodRes.status === 'success' && prodRes.data) {
                    productData = prodRes.data;
                    document.title = "Akses PDF - " + productData.title;
                    document.getElementById('pdf-toolbar-title').innerText = productData.title;
                    document.getElementById('info-product-name').innerText = productData.title;
                    
                    if(productData.pdf_drive_id) {
                        document.getElementById('pdf-iframe').src = `https://drive.google.com/file/d/${productData.pdf_drive_id}/preview`;
                    } else {
                        // Jika ID kosong di database, tampilkan error
                        document.getElementById('pdf-toolbar-title').innerText = "File belum diupload";
                        Swal.fire({ icon: 'info', title: 'File Kosong', text: 'Admin belum menyematkan file PDF untuk materi ini.', confirmButtonColor: '#00AAE7' });
                    }
                } else {
                    throw new Error("Data produk gagal diambil dari database.");
                }
                
                adjustActionButton();

            } catch (err) { 
                console.error(err); 
                Swal.fire({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: 'Gagal memuat dokumen: ' + err.message,
                    confirmButtonColor: '#f43f5e'
                });
            } 
            finally {
                document.getElementById('loading-overlay').style.display = 'none';
                if(typeof lucide !== 'undefined') lucide.createIcons();
            }
        }

        function adjustActionButton() {
            const btn = document.getElementById('btn-action-pdf');
            const desc = document.getElementById('upgrade-desc');
            
            if (isPremiumUser) {
                btn.innerHTML = `<i data-lucide="download"></i> DOWNLOAD FILE PDF`;
                btn.style.backgroundColor = '#10b981';
                
                if (isAdminGlobal) {
                    desc.innerText = "Anda masuk sebagai Admin. Hak akses penuh (VIP) untuk mengunduh dokumen telah diberikan otomatis.";
                } else {
                    desc.innerText = "Akses Premium Terverifikasi. Silakan klik tombol di bawah ini untuk mengunduh dokumen PDF Anda.";
                }
            } else {
                btn.innerHTML = `<i data-lucide="arrow-up-circle"></i> UPGRADE UNTUK DOWNLOAD`;
            }
            
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }

        function handleDownloadOrUpgrade() {
            if (isPremiumUser) {
                if (productData.pdf_download_url) {
                    window.open(productData.pdf_download_url, '_blank');
                } else if (productData.pdf_drive_id) {
                    window.open(`https://drive.google.com/uc?export=download&id=${productData.pdf_drive_id}`, '_blank');
                } else {
                    Swal.fire({ icon: 'error', title: 'Ups!', text: 'Link download belum diset.', confirmButtonColor: '#0f172a' });
                }
            } else {
                Swal.fire({
                    title: 'Buka Fitur Download! 🚀',
                    text: 'Akses download file fisik PDF hanya tersedia untuk member Premium.',
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Upgrade Premium Sekarang',
                    cancelButtonText: 'Nanti Saja',
                    confirmButtonColor: window.theme_color || '#00AAE7',
                    cancelButtonColor: '#64748b',
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = '/upgrade'; 
                    }
                });
            }
        }

        window.onload = () => { verifyAndLoad(); };
    </script>
